name: Portfolio Update

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python generate_projects.py

      - uses: actions/upload-artifact@v4
        with:
          name: projects-json
          path: projects.json